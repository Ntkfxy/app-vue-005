name: build and deploy production

on:
  push:
    tags:
      - '*'

jobs:
  release-docker-image-job:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_ACTOR,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/app-vue-005:${{ github.ref_name }}

  auto-deploy-docker-job:
    needs: release-docker-image-job
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 167.172.92.228
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}   # ⭐ แนะนำใช้ secret
          port: 22
          script: |
            docker login -u ntkfxy -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker rm -f vue-app-005 || true
            docker pull ghcr.io/ntkfxy/app-vue-005:latest
            docker run -d --restart=always --name vue-app-005 -p 9005:80 ghcr.io/ntkfxy/app-vue-005:latest